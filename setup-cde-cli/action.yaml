name: "setup-cde-cli"
description: install and configure cloudera cde cli
inputs:
  version:
    required: true
    description: "Version of cde to install"
  access_key_id:
    required: true
    description: "access key id"
  private_key:
    required: true
    description: "private key"
  codeartifact_domain:
    required: true
    description: "CodeArtifact domain"
  codeartifact_repository:
    required: true
    description: "CodeArtifact repository name"
  vcluster_endpoint:
    required: true
    description: "vcluster-endpoint url"
runs:
  using: "composite"
  steps:
    - name: Mask Sensitive Inputs
      run: |
        echo "::add-mask::${{ inputs.access_key_id }}"
        echo "::add-mask::${{ inputs.private_key }}"
      shell: bash

    - name: Set Up CDE CLI
      run: |
        aws codeartifact get-package-version-asset \
            --domain ${{ inputs.codeartifact_domain }} \
            --repository ${{ inputs.codeartifact_repository }} \
            --format generic \
            --namespace cli \
            --package cde \
            --package-version ${{ inputs.version }} \
            --asset cde cde \
            --no-cli-pager
        chmod +x ./cde
        if [ "$(id -u)" -eq 0 ]; then
            mv ./cde /usr/local/bin/cde
        else
            sudo mv ./cde /usr/local/bin/cde
        fi
      shell: bash

    - name: Credentials Config
      run: |
        mkdir -p "$HOME/.cdp"
        
        cat <<EOF > "$HOME/.cdp/credentials"
        [default]
        cdp_access_key_id = ${{ inputs.access_key_id }}
        cdp_private_key = ${{ inputs.private_key }}
        EOF
        
        chmod 600 "$HOME/.cdp/credentials"
        
        echo "CDP Credentials configured in $HOME/.cdp/credentials"
      shell: bash

    - name: Profile Config
      run: |
        mkdir -p "$HOME/.cde"
        echo "vcluster-endpoint: ${{ inputs.vcluster_endpoint }}" > "$HOME/.cde/config.yaml"
        echo "CDE Profile configured in $HOME/.cde/config.yaml"
      shell: bash